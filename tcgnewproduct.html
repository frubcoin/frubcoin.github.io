<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Add a new TCG Product to the Calendar</title>
    <meta name="description" content="Open the TCG Tracker Notion form to add a new product release.">
    <meta name="theme-color" content="#080b10">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TCG Tracker">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./assets/pwa/icon-192.png" sizes="192x192" type="image/png">
    <link rel="apple-touch-icon" href="./assets/pwa/apple-touch-icon.png">
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: #ffffff;
        overflow: hidden;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <iframe
      src="https://tcgtracker.notion.site/ebd//01ab77f9870640c0b31baafd6a4d592e"
      title="New TCG product form"
      loading="eager"
      allowfullscreen
    ></iframe>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch((error) => {
            console.error("Service worker registration failed:", error);
          });
        });
      }
    </script>
  </body>
</html>
