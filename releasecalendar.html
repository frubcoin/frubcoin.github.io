<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Upcoming TCG Releases</title>
    <meta name="description" content="Track upcoming TCG releases and add new products from an installable calendar app.">
    <meta name="theme-color" content="#080b10">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TCG Tracker">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./assets/pwa/icon-192.png" sizes="192x192" type="image/png">
    <link rel="apple-touch-icon" href="./assets/pwa/apple-touch-icon.png">
    <style>
      :root {
        color-scheme: dark;
        --bg: #080b10;
        --panel: rgba(10, 15, 22, 0.92);
        --panel-strong: rgba(16, 23, 33, 0.98);
        --border: rgba(160, 196, 255, 0.18);
        --text: #eef4ff;
        --muted: #9fb0cc;
        --accent: #79f2c0;
        --accent-strong: #48d7a1;
        --accent-soft: rgba(121, 242, 192, 0.2);
        --shadow: 0 18px 45px rgba(0, 0, 0, 0.38);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        position: relative;
        overflow: hidden;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(121, 242, 192, 0.12), transparent 32%),
          radial-gradient(circle at top right, rgba(110, 164, 255, 0.12), transparent 28%),
          var(--bg);
        color: var(--text);
      }

      .calendar-shell {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .calendar-frame {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #ffffff;
      }

      .fab {
        position: fixed;
        right: 24px;
        bottom: 24px;
        display: inline-flex;
        align-items: center;
        gap: 14px;
        min-width: 196px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        padding: 12px 16px 12px 12px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
          rgba(8, 13, 20, 0.86);
        color: var(--text);
        font: inherit;
        text-align: left;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        cursor: pointer;
        transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, background 160ms ease;
        z-index: 20;
        overflow: hidden;
      }

      .fab::before {
        content: "";
        position: absolute;
        inset: 1px 1px auto;
        height: 50%;
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent);
        pointer-events: none;
      }

      .fab:hover {
        transform: translateY(-2px) scale(1.01);
        box-shadow: 0 24px 56px rgba(0, 0, 0, 0.48);
        border-color: rgba(121, 242, 192, 0.35);
      }

      .fab:active {
        transform: translateY(0);
      }

      .fab:focus-visible,
      .modal-close:focus-visible {
        outline: 3px solid rgba(121, 242, 192, 0.45);
        outline-offset: 3px;
      }

      .fab-icon {
        position: relative;
        width: 44px;
        height: 44px;
        border-radius: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        color: #04140e;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
        flex: 0 0 auto;
      }

      .fab-icon svg {
        width: 22px;
        height: 22px;
        stroke: currentColor;
        stroke-width: 2.2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .fab-copy {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .fab-label {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.01em;
        line-height: 1.1;
      }

      .fab-meta {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.1;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(2, 6, 10, 0.54);
        backdrop-filter: blur(10px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
        z-index: 30;
      }

      .modal-backdrop.is-open {
        opacity: 1;
        pointer-events: auto;
      }

      .modal {
        position: fixed;
        right: 24px;
        bottom: 96px;
        width: min(520px, calc(100vw - 24px));
        height: min(760px, calc(100vh - 140px));
        display: flex;
        flex-direction: column;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: var(--shadow);
        overflow: hidden;
        transform: translateY(18px) scale(0.98);
        opacity: 0;
        pointer-events: none;
        transition: transform 180ms ease, opacity 180ms ease;
        z-index: 40;
      }

      .modal.is-open {
        transform: translateY(0) scale(1);
        opacity: 1;
        pointer-events: auto;
      }

      .modal-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 18px 14px;
        background: var(--panel-strong);
        border-bottom: 1px solid var(--border);
      }

      .modal-title {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
      }

      .modal-subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .modal-close {
        width: 40px;
        height: 40px;
        border: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        font: inherit;
        font-size: 22px;
        line-height: 1;
        cursor: pointer;
        flex: 0 0 auto;
      }

      .modal-body {
        flex: 1;
        min-height: 0;
        background: #080b10;
      }

      .modal-frame {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #080b10;
      }

      @media (max-width: 720px) {
        .fab {
          right: 16px;
          bottom: 16px;
          left: 16px;
          justify-content: center;
          min-width: 0;
        }

        .modal {
          right: 12px;
          left: 12px;
          bottom: 12px;
          width: auto;
          height: min(82vh, 760px);
          border-radius: 20px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .fab,
        .modal,
        .modal-backdrop {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="calendar-shell">
      <iframe
        class="calendar-frame"
        src="https://tcgtracker.notion.site/ebd//04ad41f1568547979c8299e0a3e35bed?v=1983e614ec384143ba6e7d38e71245b1"
        title="Upcoming TCG release calendar"
        loading="eager"
        allowfullscreen
      ></iframe>
    </main>

    <button class="fab" id="open-form" type="button" aria-haspopup="dialog" aria-controls="form-modal" aria-expanded="false">
      <span class="fab-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 5v14"></path>
          <path d="M5 12h14"></path>
        </svg>
      </span>
      <span class="fab-copy">
        <span class="fab-label">Add Product</span>
        <span class="fab-meta">Quick entry form</span>
      </span>
    </button>

    <div class="modal-backdrop" id="modal-backdrop" hidden></div>

    <section
      class="modal"
      id="form-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="form-title"
      aria-hidden="true"
    >
      <header class="modal-header">
        <div>
          <h1 class="modal-title" id="form-title">Quick Add Product</h1>
          <p class="modal-subtitle">Use the native form here without leaving the release calendar view.</p>
        </div>
        <button class="modal-close" id="close-form" type="button" aria-label="Close product form">
          &times;
        </button>
      </header>
      <div class="modal-body">
        <iframe
          class="modal-frame"
          id="form-frame"
          title="Quick add TCG product form"
          loading="lazy"
          allowfullscreen
        ></iframe>
      </div>
    </section>

    <script>
      const openButton = document.getElementById("open-form");
      const closeButton = document.getElementById("close-form");
      const modal = document.getElementById("form-modal");
      const backdrop = document.getElementById("modal-backdrop");
      const formFrame = document.getElementById("form-frame");
      const formSource = "./tcgnewproduct.html";

      function openModal() {
        if (!formFrame.src) {
          formFrame.src = formSource;
        }

        backdrop.hidden = false;
        modal.removeAttribute("aria-hidden");
        openButton.setAttribute("aria-expanded", "true");
        backdrop.classList.add("is-open");
        modal.classList.add("is-open");
        closeButton.focus();
      }

      function closeModal() {
        backdrop.classList.remove("is-open");
        modal.classList.remove("is-open");
        modal.setAttribute("aria-hidden", "true");
        openButton.setAttribute("aria-expanded", "false");
        openButton.focus();

        window.setTimeout(() => {
          if (!modal.classList.contains("is-open")) {
            backdrop.hidden = true;
          }
        }, 180);
      }

      openButton.addEventListener("click", openModal);
      closeButton.addEventListener("click", closeModal);
      backdrop.addEventListener("click", closeModal);

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && modal.classList.contains("is-open")) {
          closeModal();
        }
      });

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch((error) => {
            console.error("Service worker registration failed:", error);
          });
        });
      }
    </script>
  </body>
</html>
