<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCG Tracker Offline</title>
    <meta name="theme-color" content="#080b10">
    <style>
      :root {
        color-scheme: dark;
        --bg: #080b10;
        --panel: rgba(16, 23, 33, 0.96);
        --border: rgba(160, 196, 255, 0.18);
        --text: #eef4ff;
        --muted: #9fb0cc;
        --accent: #79f2c0;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(121, 242, 192, 0.12), transparent 32%),
          radial-gradient(circle at top right, rgba(110, 164, 255, 0.12), transparent 28%),
          var(--bg);
        color: var(--text);
      }

      .panel {
        width: min(100%, 480px);
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.38);
      }

      .eyebrow {
        display: inline-block;
        margin-bottom: 14px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(121, 242, 192, 0.12);
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 0 0 14px;
        color: var(--muted);
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        margin-top: 10px;
        padding: 0 18px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent), #95f7d4);
        color: #04140e;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <span class="eyebrow">Offline</span>
      <h1>TCG Tracker needs a connection.</h1>
      <p>The app shell is installed, but the embedded Notion calendar and form still load from the web.</p>
      <p>Reconnect to the internet to view releases or add a new product.</p>
      <a href="./releasecalendar.html">Try again</a>
    </main>
  </body>
</html>
